<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        img{
            display:block;
            margin:auto;
            border-radius:50%;
            width:120px;
            height:120px;
            object-fit:cover;
        }

        button{
            width:100%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Profile</h2>

    {% if user.profile_pic %}
        <img src="{{ user.profile_pic.url }}">
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="name" value="{{ user.name }}" required>

        <input type="email" name="email" value="{{ user.email }}" readonly>

        <input type="number" name="age" value="{{ user.age }}" required>

        <input type="text" name="phone" value="{{ user.phone }}" required>

        <label>Profile Picture</label>
        <input type="file" name="profile_pic">

        <button type="submit">Update Profile</button>
    </form>
</div>

</body>
</html>
