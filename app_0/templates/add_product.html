<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        input[type="file"]{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        input:focus,
        textarea:focus{
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76,175,80,0.5);
        }

        textarea{
            resize: none;
        }

        .btn{
            width: 100%;
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover{
            background: #45a049;
            transform: translateY(-2px);
        }

        .icon{
            text-align: center;
            font-size: 50px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="icon">🛍️</div>

        <h2>Add New Product</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="product_name" placeholder="Enter product name" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="5" placeholder="Enter product description" required></textarea>
            </div>

            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" step="0.01" name="price" placeholder="Enter price" required>
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="product_image">
            </div>

            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" name="stock" placeholder="Enter stock quantity" required>
            </div>

            <button type="submit" class="btn">
                Add Product
            </button>

        </form>

    </div>

</body>
</html>
