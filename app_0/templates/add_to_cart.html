<!DOCTYPE html>
<html>
<head>
    <title>Add To Cart</title>
</head>
<body>

<h2>Add To Cart</h2>

{% if product.product_image %}
    <img src="{{ product.product_image.url }}" width="200">
{% endif %}

<h3>{{ product.product_name }}</h3>
<p>{{ product.description }}</p>
<p>Price: ₹{{ product.price }}</p>
<p>Available Stock: {{ product.stock }}</p>

<form method="POST">
    {% csrf_token %}

    <label>Quantity:</label>
    <input
        type="number"
        name="quantity"
        min="1"
        max="{{ product.stock }}"
        value="1"
        required
    >

    <br><br>

    <button type="submit">
        Add To Cart
    </button>
</form>

</body>
</html>
