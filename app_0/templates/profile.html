<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        .profile-container{
            width:500px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .profile-pic{
            width:150px;
            height:150px;
            border-radius:50%;
            object-fit:cover;
            border:3px solid #007bff;
        }

        h2{
            margin-top:15px;
            color:#333;
        }

        .info{
            text-align:left;
            margin-top:20px;
        }

        .info p{
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            text-decoration:none;
            color:white;
            background:#007bff;
            border-radius:5px;
        }

        .btn:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="profile-container">

    {% if user.profile_pic %}
        <img src="{{ user.profile_pic.url }}" class="profile-pic">
    {% else %}
        <img src="https://via.placeholder.com/150" class="profile-pic">
    {% endif %}

    <h2>{{ user.name }}</h2>

    <div class="info">
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Age:</strong> {{ user.age }}</p>
        <p><strong>Phone:</strong> {{ user.phone }}</p>
    </div>

    <a href="{% url 'edit_profile' %}" class="btn">Edit Profile</a>

</div>

</body>
</html>
